<div class="auth-container">
  <!-- LEFT PANEL -->
  <div class="auth-left d-none d-lg-flex">
    <div class="auth-left-content">
      <a href="index.html" class="snap-logo mb-5 d-block">
        <span class="logo-icon"><i class="fa-solid fa-link"></i></span>
        Snap<span class="accent">URL</span>
      </a>
      <h2 class="auth-left-title">
        Start shortening<br /><span class="gradient-text">for free.</span>
      </h2>
      <p class="auth-left-sub">
        Join thousands of creators, marketers, and developers who trust SnapURL.
      </p>

      <div class="pricing-mini mt-5">
        <div class="price-badge">
          <div class="price-tier">Free Plan</div>
          <div class="price-val">$0<span>/mo</span></div>
          <div class="price-features">
            <div><i class="fa-solid fa-check"></i> 50 links/month</div>
            <div><i class="fa-solid fa-check"></i> Basic analytics</div>
            <div><i class="fa-solid fa-check"></i> QR codes</div>
            <div><i class="fa-solid fa-check"></i> Custom aliases</div>
          </div>
        </div>
      </div>
    </div>
    <div class="auth-left-orb orb-1"></div>
    <div class="auth-left-orb orb-2"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="auth-right">
    <div class="auth-form-wrap">
      <div class="auth-back mb-4">
        <a href="/"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
      </div>
      <h3 class="auth-form-title">Create Account</h3>
      <p class="auth-form-sub">
        Already registered?
        <a href="{{ login_url }}" class="accent-link">Sign in here</a>
      </p>

      <div id="registerAlert" class="alert d-none mt-3 py-2 small"></div>

      <form id="registerForm" class="mt-4">
        <div class="row g-3">
          <div class="col-6">
            <label class="snap-label">First Name</label>
            <input
              type="text"
              id="regFirstName"
              class="form-control snap-input"
              placeholder="John"
              required
            />
          </div>
          <div class="col-6">
            <label class="snap-label">Last Name</label>
            <input
              type="text"
              id="regLastName"
              class="form-control snap-input"
              placeholder="Doe"
              required
            />
          </div>
        </div>
        <div class="mt-3">
          <label class="snap-label">Email Address</label>
          <div class="input-icon-wrap">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input
              type="email"
              id="regEmail"
              class="form-control snap-input ps-5"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>
        <div class="mt-3">
          <label class="snap-label">Username</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-at input-icon"></i>
            <input
              type="text"
              id="regUsername"
              class="form-control snap-input ps-5"
              placeholder="coolname"
              required
            />
          </div>
        </div>
        <div class="mt-3">
          <label class="snap-label">Password</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              id="regPassword"
              class="form-control snap-input ps-5"
              placeholder="Min 8 characters"
              required
              minlength="8"
              data-action="validateModule#checkPasswordStrength"
              data-pw="regPassword"
            />
            <button
              type="button"
              class="btn-toggle-pw"
              id="registerTogglePassword"
              data-action="validateModule#togglePassword"
              data-id="regPassword"
              data-btn="registerTogglePassword"
            >
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="pw-strength mt-2">
            <div class="pw-bar" id="pwBar"></div>
          </div>
          <div class="pw-label small mt-1" id="pwLabel"></div>
        </div>
        <div class="mt-3">
          <label class="snap-label">Confirm Password</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              id="regConfirm"
              class="form-control snap-input ps-5"
              placeholder="Repeat password"
              required
            />
          </div>
        </div>
        <div class="mt-3 form-check">
          <input
            type="checkbox"
            class="form-check-input"
            id="agreeTerms"
            required
          />
          <label class="form-check-label small" for="agreeTerms">
            I agree to the
            <a href="{{ tos_url }}" class="accent-link">Terms of Service</a> and
            <a href="{{ pp_url }}" class="accent-link">Privacy Policy</a>
          </label>
        </div>
        <button
          type="submit"
          class="btn btn-snap-primary w-100 btn-lg mt-4"
          id="registerBtn"
        >
          <span class="btn-text"
            ><i class="fa-solid fa-rocket me-2"></i>Create Free Account</span
          >
          <span class="btn-loading d-none"
            ><i class="fa-solid fa-spinner fa-spin me-2"></i>Creating
            account...</span
          >
        </button>
      </form>
    </div>
  </div>
</div>
